<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registry Engine — Selective Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #000;
            --border: #e5e5e5;
            --status-pending: #94a3b8;
            --status-progress: #3b82f6;
            --status-complete: #10b981;
            --danger: #ff4d4d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            outline: none;
        }

        .meta-date {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            color: #888;
            outline: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            border-radius: 4px;
            background: white;
            transition: 0.2s;
        }

        .btn:hover {
            background: #f5f5f5;
        }

        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-danger.active {
            background: var(--danger);
            color: white;
        }

        .btn-pdf {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-pdf:hover {
            background: #333;
        }

        .table-scroll {
            width: 100%;
            max-width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            font-size: 0.65rem;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 1px;
            padding: 12px;
            border-bottom: 1px solid var(--accent);
            color: #888;
            position: relative;
        }

        thead th:not(.no-delete) {
            cursor: grab;
        }

        thead th.dragging {
            opacity: 0.45;
        }

        thead th.drag-over-before::before,
        thead th.drag-over-after::after {
            content: '';
            position: absolute;
            top: 6px;
            bottom: 6px;
            width: 3px;
            background: var(--accent);
            border-radius: 999px;
        }

        thead th.drag-over-before::before {
            left: 0;
        }

        thead th.drag-over-after::after {
            right: 0;
        }

        .delete-mode th:not(.no-delete) {
            cursor: pointer;
            background: #fff5f5;
            border: 1px dashed var(--danger);
        }

        .delete-mode th:not(.no-delete):hover {
            background: var(--danger);
            color: white;
        }

        .delete-mode th:not(.no-delete)::after {
            content: 'REMOVE';
            position: absolute;
            top: 0;
            right: 0;
            font-size: 8px;
            padding: 2px;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px;
            vertical-align: middle;
            position: relative;
            min-width: 120px;
        }

        th:first-child,
        td:first-child {
            min-width: 50px;
        }

        .photo-upload-wrapper {
            width: 100px;
            height: 60px;
            background: #f4f4f4;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .photo-upload-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .delete-img-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            border: none;
        }

        .has-image:hover .delete-img-btn {
            display: flex;
        }

        .cell-input {
            width: 95%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 5px 0;
            outline: none;
            border-bottom: 1px solid transparent;
        }

        .cell-input:focus {
            border-bottom-color: var(--accent);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #eee;
        }

        .status-select {
            border: none;
            background: transparent;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            outline: none;
            cursor: pointer;
        }

        tr[data-status="pending"] .status-dot {
            background: var(--status-pending);
        }

        tr[data-status="progress"] .status-dot {
            background: var(--status-progress);
        }

        tr[data-status="complete"] .status-dot {
            background: var(--status-complete);
        }

        .hidden {
            display: none !important;
        }

        /* Custom Modal System */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .custom-modal {
            background: white;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            border-radius: 2px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .custom-modal {
            transform: translateY(0);
        }

        .custom-modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .custom-modal input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 2px solid var(--accent);
            font-size: 1rem;
            outline: none;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .modal-btns {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        #imageModal img {
            max-width: 85%;
            max-height: 80%;
            border: 5px solid white;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        @media screen and (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .controls {
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="capture-area">
        <header>
            <div class="title-group">
                <p id="edit-date" class="meta-date" contenteditable="true">April 14, 2026</p>
                <h1 id="edit-title" contenteditable="true">Product Registry</h1>
            </div>
            <div class="controls no-pdf">
                <button class="btn" onclick="addColumn()">+ Add Column</button>
                <button class="btn btn-danger" id="delModeBtn" onclick="toggleDeleteMode()">Select Column to
                    Remove</button>
                <label class="toggle-wrapper" style="font-size: 0.6rem; font-weight: bold; cursor:pointer;">
                    <input type="checkbox" id="toggleStatus" checked onchange="toggleStatusColumn()"> STATUS
                </label>
                <button class="btn btn-pdf" onclick="openExportModal()">Export PDF</button>
            </div>
        </header>

        <div class="table-scroll" id="table-scroll">
            <table id="mainTable">
                <thead>
                    <tr id="header-row">
                        <th style="width: 40px;" class="no-delete">S.No</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Part Photo</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Part Name</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Cost</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Qty</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Material</th>
                        <th contenteditable="true" onclick="handleColDelete(this)">Total</th>
                        <th class="status-col no-delete" id="th-status" contenteditable="true">Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="pdfModal">
        <div class="custom-modal">
            <h3>Save Registry</h3>
            <input type="text" id="pdfFileName" placeholder="Enter file name..." autofocus>
            <div class="modal-btns">
                <button class="btn" onclick="closeExportModal()">Cancel</button>
                <button class="btn btn-pdf" onclick="executePDFExport()">Download</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="imageModal" onclick="this.classList.remove('active')">
        <img id="modalImg" src="">
    </div>

    <script>
        let isDeleteMode = false;
        const STORAGE_KEY = 'inventory_registry_state_v1';
        const DEFAULT_ROW_COUNT = 15;
        const MAX_STORED_IMAGE_SIZE = 900;
        const STORED_IMAGE_QUALITY = 0.82;
        let draggedColumnIndex = null;
        let dragInsertAfter = false;

        function initTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for (let i = 1; i <= 15; i++) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td style="color:#ccc;">${String(i).padStart(2, '0')}</td>
                <td>
                    <div class="photo-upload-wrapper">
                        <button class="delete-img-btn" onclick="removeImage(this, event)">×</button>
                        <div style="width:100%; height:100%;" onclick="this.nextElementSibling.click()">
                            <img src="" class="preview-img" onclick="previewImage(event, this)">
                        </div>
                        <input type="file" style="display:none" accept="image/*" onchange="processImage(this)">
                    </div>
                </td>
                <td><input type="text" class="cell-input" placeholder="..."></td>
                <td><input type="text" class="cell-input" placeholder="..."></td>
                <td><input type="text" class="cell-input" placeholder="..."></td>
                <td><input type="text" class="cell-input" placeholder="..."></td>
                <td><input type="text" class="cell-input" placeholder="..."></td>
                <td class="status-col">
                    <div class="status-container">
                        <div class="status-dot"></div>
                        <select class="status-select" onchange="updateRowStatus(this)">
                            <option value="">Set</option>
                            <option value="pending">Pending</option>
                            <option value="progress">Working</option>
                            <option value="complete">Done</option>
                        </select>
                    </div>
                </td>
            `;
                tbody.appendChild(tr);
            }
        }

        function readSavedState() {
            try {
                const savedState = localStorage.getItem(STORAGE_KEY);
                return savedState ? JSON.parse(savedState) : null;
            } catch (error) {
                console.warn('Could not load saved inventory data.', error);
                return null;
            }
        }

        function getDefaultColumns() {
            return [
                { title: 'Part Photo', kind: 'photo' },
                { title: 'Part Name', kind: 'text' },
                { title: 'Cost', kind: 'text' },
                { title: 'Qty', kind: 'text' },
                { title: 'Material', kind: 'text' },
                { title: 'Total', kind: 'text' }
            ];
        }

        function getSavedColumns(savedState) {
            if (!savedState || !Array.isArray(savedState.columns) || savedState.columns.length === 0) {
                return getDefaultColumns();
            }

            return savedState.columns.map((column) => ({
                title: typeof column.title === 'string' ? column.title : 'New Column',
                kind: column.kind === 'photo' ? 'photo' : 'text'
            }));
        }

        function createHeaderCell(title) {
            const th = document.createElement('th');
            th.contentEditable = 'true';
            th.textContent = title;
            th.onclick = function () { handleColDelete(this); };
            return th;
        }

        function createTextCell(value) {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell-input';
            input.placeholder = '...';
            input.value = value || '';
            td.appendChild(input);
            return td;
        }

        function createPhotoCell(src) {
            const td = document.createElement('td');
            const wrapper = document.createElement('div');
            wrapper.className = 'photo-upload-wrapper';

            const deleteButton = document.createElement('button');
            deleteButton.type = 'button';
            deleteButton.className = 'delete-img-btn';
            deleteButton.textContent = 'x';
            deleteButton.onclick = function (event) { removeImage(this, event); };

            const uploadTarget = document.createElement('div');
            uploadTarget.style.width = '100%';
            uploadTarget.style.height = '100%';

            const image = document.createElement('img');
            image.src = src || '';
            image.className = 'preview-img';
            image.alt = 'Part photo';
            image.style.display = src ? 'block' : 'none';
            image.onclick = function (event) { previewImage(event, this); };

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.style.display = 'none';
            fileInput.accept = 'image/*';
            fileInput.onchange = function () { processImage(this); };

            uploadTarget.onclick = function () { fileInput.click(); };
            uploadTarget.appendChild(image);
            wrapper.appendChild(deleteButton);
            wrapper.appendChild(uploadTarget);
            wrapper.appendChild(fileInput);

            if (src) {
                wrapper.classList.add('has-image');
            }

            td.appendChild(wrapper);
            return td;
        }

        function optimizeImageForStorage(src, callback) {
            const image = new Image();

            image.onload = function () {
                const scale = Math.min(1, MAX_STORED_IMAGE_SIZE / image.width, MAX_STORED_IMAGE_SIZE / image.height);
                const width = Math.round(image.width * scale);
                const height = Math.round(image.height * scale);
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                if (!context) {
                    callback(src);
                    return;
                }

                canvas.width = width;
                canvas.height = height;
                context.drawImage(image, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', STORED_IMAGE_QUALITY));
            };

            image.onerror = function () {
                callback(src);
            };

            image.src = src;
        }

        function createStatusCell(value) {
            const td = document.createElement('td');
            td.className = 'status-col';

            const statusContainer = document.createElement('div');
            statusContainer.className = 'status-container';

            const statusDot = document.createElement('div');
            statusDot.className = 'status-dot';

            const select = document.createElement('select');
            select.className = 'status-select';
            select.onchange = function () { updateRowStatus(this); };

            [
                { value: '', label: 'Set' },
                { value: 'pending', label: 'Pending' },
                { value: 'progress', label: 'Working' },
                { value: 'complete', label: 'Done' }
            ].forEach((optionData) => {
                const option = document.createElement('option');
                option.value = optionData.value;
                option.textContent = optionData.label;
                select.appendChild(option);
            });

            select.value = value || '';
            statusContainer.appendChild(statusDot);
            statusContainer.appendChild(select);
            td.appendChild(statusContainer);
            return td;
        }

        function getCellData(rowState, index) {
            if (!rowState || !Array.isArray(rowState.cells)) {
                return {};
            }

            return rowState.cells[index] || {};
        }

        function createTableRow(rowNumber, columns, rowState) {
            const tr = document.createElement('tr');
            const statusValue = rowState && typeof rowState.status === 'string' ? rowState.status : '';

            if (statusValue) {
                tr.setAttribute('data-status', statusValue);
            }

            const serialCell = document.createElement('td');
            serialCell.style.color = '#ccc';
            serialCell.textContent = String(rowNumber).padStart(2, '0');
            tr.appendChild(serialCell);

            columns.forEach((column, index) => {
                const cellData = getCellData(rowState, index);
                const cell = column.kind === 'photo'
                    ? createPhotoCell(typeof cellData.image === 'string' ? cellData.image : '')
                    : createTextCell(typeof cellData.text === 'string' ? cellData.text : '');

                tr.appendChild(cell);
            });

            tr.appendChild(createStatusCell(statusValue));
            return tr;
        }

        function renderHeader(columns, statusTitle) {
            const headerRow = document.getElementById('header-row');
            headerRow.innerHTML = '';

            const serialHeader = document.createElement('th');
            serialHeader.style.width = '40px';
            serialHeader.className = 'no-delete';
            serialHeader.textContent = 'S.No';
            headerRow.appendChild(serialHeader);

            columns.forEach((column) => {
                headerRow.appendChild(createHeaderCell(column.title));
            });

            const statusHeader = document.createElement('th');
            statusHeader.className = 'status-col no-delete';
            statusHeader.id = 'th-status';
            statusHeader.contentEditable = 'true';
            statusHeader.textContent = statusTitle || 'Status';
            headerRow.appendChild(statusHeader);
            enableColumnDragging();
        }

        function restoreSavedState() {
            const savedState = readSavedState();
            if (!savedState) return;

            const columns = getSavedColumns(savedState);
            const rowStates = Array.isArray(savedState.rows) ? savedState.rows : [];
            const rowCount = Math.max(DEFAULT_ROW_COUNT, rowStates.length);
            const tbody = document.getElementById('tableBody');

            document.getElementById('edit-date').textContent =
                typeof savedState.date === 'string' ? savedState.date : 'April 14, 2026';
            document.getElementById('edit-title').textContent =
                typeof savedState.title === 'string' ? savedState.title : 'Product Registry';
            document.getElementById('toggleStatus').checked = savedState.statusVisible !== false;

            renderHeader(columns, typeof savedState.statusTitle === 'string' ? savedState.statusTitle : 'Status');
            tbody.innerHTML = '';

            for (let i = 1; i <= rowCount; i++) {
                tbody.appendChild(createTableRow(i, columns, rowStates[i - 1]));
            }

            toggleStatusColumn(false);
        }

        function getCurrentColumns() {
            const headerCells = Array.from(document.querySelectorAll('#header-row th'));
            const statusHeader = document.getElementById('th-status');
            const statusIndex = statusHeader ? statusHeader.cellIndex : headerCells.length;

            return headerCells.slice(1, statusIndex).map((headerCell, index) => {
                const sampleCell = document.querySelector(`#tableBody tr td:nth-child(${index + 2})`);
                const hasPhotoUpload = sampleCell && sampleCell.querySelector('.photo-upload-wrapper');

                return {
                    title: headerCell.textContent || '',
                    kind: hasPhotoUpload ? 'photo' : 'text'
                };
            });
        }

        function getCurrentRows(columns) {
            return Array.from(document.querySelectorAll('#tableBody tr')).map((row) => {
                const rowStatus = row.querySelector('.status-select');
                const cells = Array.from(row.cells).slice(1, columns.length + 1);

                return {
                    cells: cells.map((cell, index) => {
                        if (columns[index].kind === 'photo') {
                            const image = cell.querySelector('.preview-img');
                            return { image: image ? image.getAttribute('src') || '' : '' };
                        }

                        const input = cell.querySelector('.cell-input');
                        return { text: input ? input.value : '' };
                    }),
                    status: rowStatus ? rowStatus.value : ''
                };
            });
        }

        function saveState() {
            const columns = getCurrentColumns();
            const state = {
                title: document.getElementById('edit-title').textContent || '',
                date: document.getElementById('edit-date').textContent || '',
                statusTitle: document.getElementById('th-status').textContent || 'Status',
                statusVisible: document.getElementById('toggleStatus').checked,
                columns,
                rows: getCurrentRows(columns)
            };

            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (error) {
                console.warn('Could not save inventory data.', error);
            }
        }

        function bindAutoSave() {
            const captureArea = document.getElementById('capture-area');
            captureArea.addEventListener('input', saveState);
            captureArea.addEventListener('change', saveState);
            window.addEventListener('beforeunload', saveState);
        }

        function clearColumnDragStyles() {
            document.querySelectorAll('#header-row th').forEach((headerCell) => {
                headerCell.classList.remove('dragging', 'drag-over-before', 'drag-over-after');
            });
        }

        function clearColumnDropStyles() {
            document.querySelectorAll('#header-row th').forEach((headerCell) => {
                headerCell.classList.remove('drag-over-before', 'drag-over-after');
            });
        }

        function handleHeaderDragStart(event) {
            if (isDeleteMode || event.currentTarget.classList.contains('no-delete')) {
                event.preventDefault();
                return;
            }

            draggedColumnIndex = event.currentTarget.cellIndex;
            event.currentTarget.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', String(draggedColumnIndex));
        }

        function handleHeaderDragOver(event) {
            if (draggedColumnIndex === null || isDeleteMode || event.currentTarget.classList.contains('no-delete')) {
                return;
            }

            event.preventDefault();
            clearColumnDropStyles();

            const headerCell = event.currentTarget;
            const bounds = headerCell.getBoundingClientRect();
            dragInsertAfter = event.clientX > bounds.left + (bounds.width / 2);
            headerCell.classList.add(dragInsertAfter ? 'drag-over-after' : 'drag-over-before');
            event.dataTransfer.dropEffect = 'move';
        }

        function handleHeaderDrop(event) {
            if (draggedColumnIndex === null || isDeleteMode || event.currentTarget.classList.contains('no-delete')) {
                return;
            }

            event.preventDefault();
            moveColumn(draggedColumnIndex, event.currentTarget.cellIndex, dragInsertAfter);
            draggedColumnIndex = null;
            dragInsertAfter = false;
            clearColumnDragStyles();
        }

        function handleHeaderDragEnd() {
            draggedColumnIndex = null;
            dragInsertAfter = false;
            clearColumnDragStyles();
        }

        function moveColumn(fromIndex, targetIndex, insertAfter) {
            const targetPosition = insertAfter ? targetIndex + 1 : targetIndex;
            const normalizedTarget = fromIndex < targetPosition ? targetPosition - 1 : targetPosition;

            if (fromIndex === normalizedTarget) {
                return;
            }

            document.querySelectorAll('#mainTable tr').forEach((row) => {
                const movingCell = row.children[fromIndex];

                if (!movingCell) {
                    return;
                }

                row.removeChild(movingCell);
                row.insertBefore(movingCell, row.children[normalizedTarget] || null);
            });

            enableColumnDragging();
            saveState();
        }

        function enableColumnDragging() {
            document.querySelectorAll('#header-row th').forEach((headerCell) => {
                const canDrag = !headerCell.classList.contains('no-delete') && !isDeleteMode;
                headerCell.draggable = canDrag;
                headerCell.title = canDrag ? 'Drag to reorder column' : '';
                headerCell.ondragstart = canDrag ? handleHeaderDragStart : null;
                headerCell.ondragover = canDrag ? handleHeaderDragOver : null;
                headerCell.ondragleave = canDrag ? clearColumnDropStyles : null;
                headerCell.ondrop = canDrag ? handleHeaderDrop : null;
                headerCell.ondragend = canDrag ? handleHeaderDragEnd : null;
            });
        }

        // Modal Controls
        function openExportModal() {
            const modal = document.getElementById('pdfModal');
            const input = document.getElementById('pdfFileName');
            input.value = "Inventory_Report_" + new Date().toLocaleDateString().replace(/\//g, '-');
            modal.classList.add('active');
            setTimeout(() => input.select(), 100);
        }

        function closeExportModal() {
            document.getElementById('pdfModal').classList.remove('active');
        }

        const PDF_WATERMARK_TEXT = 'SHAKIR DESIGNER';

        function addPDFWatermark(pdf) {
            const pageCount = pdf.internal.getNumberOfPages();
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();

            for (let pageNumber = 1; pageNumber <= pageCount; pageNumber++) {
                pdf.setPage(pageNumber);
                pdf.setFont('helvetica', 'bold');
                pdf.setFontSize(46);
                pdf.setTextColor(215, 215, 215);
                pdf.text(PDF_WATERMARK_TEXT, pageWidth / 2, pageHeight / 2, {
                    align: 'center',
                    angle: -30
                });
            }
        }

        function executePDFExport() {
            const name = document.getElementById('pdfFileName').value || "Report";
            closeExportModal();

            const element = document.getElementById('capture-area');
            const controls = document.querySelector('.controls');
            const tableScroll = document.getElementById('table-scroll');
            const originalElementWidth = element.style.width;
            const originalTableOverflow = tableScroll.style.overflow;
            const originalTableWidth = tableScroll.style.width;
            const exportWidth = Math.max(element.scrollWidth, tableScroll.scrollWidth);

            controls.style.display = 'none';
            element.style.width = `${exportWidth}px`;
            tableScroll.style.overflow = 'visible';
            tableScroll.style.width = `${exportWidth}px`;

            const restoreExportView = () => {
                controls.style.display = 'flex';
                element.style.width = originalElementWidth;
                tableScroll.style.overflow = originalTableOverflow;
                tableScroll.style.width = originalTableWidth;
            };

            html2pdf().set({
                margin: 0.2,
                filename: name + '.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
            }).from(element).toPdf().get('pdf').then((pdf) => {
                addPDFWatermark(pdf);
            }).save().then(() => {
                restoreExportView();
            }).catch(() => {
                restoreExportView();
            });
        }

        // Enter Key Trigger for Modal
        document.getElementById('pdfFileName').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') executePDFExport();
        });

        // Column Management Logic
        function addColumn() {
            const headerRow = document.getElementById('header-row');
            const statusTh = document.getElementById('th-status');

            const newTh = document.createElement('th');
            newTh.contentEditable = "true";
            newTh.innerText = "New Column";
            newTh.onclick = function () { handleColDelete(this); };

            headerRow.insertBefore(newTh, statusTh);

            const rows = document.querySelectorAll('tbody tr');
            rows.forEach(tr => {
                const statusTd = tr.querySelector('.status-col');
                tr.insertBefore(createTextCell(''), statusTd);
            });

            enableColumnDragging();
            saveState();
        }

        function toggleDeleteMode() {
            isDeleteMode = !isDeleteMode;
            const btn = document.getElementById('delModeBtn');
            const table = document.getElementById('mainTable');

            if (isDeleteMode) {
                btn.classList.add('active');
                btn.innerText = "Cancel Deletion";
                table.classList.add('delete-mode');
            } else {
                btn.classList.remove('active');
                btn.innerText = "Select Column to Remove";
                table.classList.remove('delete-mode');
            }

            enableColumnDragging();
        }

        function handleColDelete(th) {
            if (!isDeleteMode || th.classList.contains('no-delete')) return;
            const index = th.cellIndex;
            if (confirm(`Remove "${th.innerText}" column?`)) {
                const rows = document.querySelectorAll('#mainTable tr');
                rows.forEach(row => row.deleteCell(index));
                toggleDeleteMode();
                saveState();
            }
        }

        function processImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (typeof e.target.result !== 'string') return;

                    optimizeImageForStorage(e.target.result, (optimizedSrc) => {
                        const wrapper = input.parentElement;
                        const img = wrapper.querySelector('.preview-img');
                        img.src = optimizedSrc;
                        img.style.display = 'block';
                        wrapper.classList.add('has-image');
                        saveState();
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage(btn, event) {
            event.stopPropagation();
            const wrapper = btn.parentElement;
            const img = wrapper.querySelector('.preview-img');
            img.src = "";
            img.style.display = "none";
            wrapper.classList.remove('has-image');
            saveState();
        }

        function previewImage(event, img) {
            event.stopPropagation();
            if (!img.src) return;
            document.getElementById('modalImg').src = img.src;
            document.getElementById('imageModal').classList.add('active');
        }

        function toggleStatusColumn(shouldSave = true) {
            const isVisible = document.getElementById('toggleStatus').checked;
            document.querySelectorAll('.status-col').forEach(col => col.classList.toggle('hidden', !isVisible));
            if (shouldSave) {
                saveState();
            }
        }

        function updateRowStatus(select) {
            select.closest('tr').setAttribute('data-status', select.value);
            saveState();
        }

        window.onload = function () {
            initTable();
            restoreSavedState();
            enableColumnDragging();
            bindAutoSave();
        };
    </script>

</body>

</html>
